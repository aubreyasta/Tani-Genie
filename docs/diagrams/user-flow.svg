<svg viewBox="0 0 1200 860" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#6B5642"/>
    </marker>
    <style>
      .title{font-weight:800;font-size:16px;fill:#241C14;letter-spacing:-.3px}
      .sub{font-weight:500;font-size:11px;fill:#8a7a63}
      .n{font-weight:700;font-size:10px;fill:#241C14}
      .ns{font-weight:600;font-size:9.5px}
      .lbl{font-weight:700;font-size:9px;fill:#6B5642}
      .edge{fill:none;stroke:#6B5642;stroke-width:1.5;marker-end:url(#a)}
      .edged{fill:none;stroke:#8a7a63;stroke-width:1.4;stroke-dasharray:5 4;marker-end:url(#a)}
      .leg{font-weight:600;font-size:10px;fill:#6B5642}
    </style>
  </defs>

  <text class="title" x="24" y="28">Tanigata — User Flow</text>
  <text class="sub" x="200" y="28">every path through the product: entry → onboarding → home hub → feature flows → loop back</text>

  <!-- ===================== EDGES (under nodes) ===================== -->
  <!-- entries converge -->
  <path class="edge" d="M411,96 C411,110 560,110 605,114"/>
  <path class="edge" d="M611,96 L611,114"/>
  <path class="edge" d="M826,96 C826,110 660,110 617,114"/>
  <!-- D1 yes -> onboard -->
  <path class="edge" d="M541,150 C470,150 441,168 441,194"/>
  <text class="lbl" x="486" y="140">Yes</text>
  <!-- onboard -> home -->
  <path class="edge" d="M441,240 C441,268 470,301 449,301"/>
  <!-- D1 no -> home -->
  <path class="edge" d="M611,180 L611,270"/>
  <text class="lbl" x="620" y="215">No</text>
  <text class="sub" x="628" y="230" font-size="9">returning · cached if offline</text>
  <!-- home -> lanes -->
  <path class="edge" d="M611,332 C400,362 175,360 158,382"/>
  <path class="edge" d="M611,332 C520,362 410,360 410,382"/>
  <path class="edge" d="M611,332 C645,362 660,360 660,382"/>
  <path class="edge" d="M611,332 C800,362 910,360 910,382"/>
  <!-- add-crop lane -->
  <path class="edge" d="M158,428 L158,450"/>
  <path class="edged" d="M158,494 C158,300 300,262 449,262"/>
  <text class="lbl" x="180" y="330">re-tailors</text>
  <text class="lbl" x="180" y="342">all features</text>
  <!-- W lane -->
  <path class="edge" d="M410,428 L410,442"/>
  <path class="edge" d="M410,486 L410,504"/>
  <path class="edge" d="M410,582 L410,606"/>
  <text class="lbl" x="418" y="598">Yes</text>
  <path class="edge" d="M410,652 L410,668"/>
  <path class="edge" d="M410,710 C410,742 445,748 452,756"/>
  <!-- W no -> all clear box -> pill -->
  <path class="edge" d="M332,542 C300,542 285,542 292,542"/>
  <text class="lbl" x="300" y="533">No</text>
  <path class="edge" d="M235,560 C235,700 360,772 418,772"/>
  <!-- P lane -->
  <path class="edge" d="M660,428 L660,442"/>
  <path class="edge" d="M660,486 L660,504"/>
  <path class="edge" d="M660,582 L660,606"/>
  <text class="lbl" x="668" y="598">Yes</text>
  <path class="edge" d="M660,652 L660,668"/>
  <path class="edge" d="M660,710 C660,742 560,750 545,756"/>
  <!-- P no -> hold box -> pill -->
  <path class="edge" d="M738,542 C765,542 775,542 772,542"/>
  <text class="lbl" x="742" y="533">No</text>
  <path class="edge" d="M785,560 C785,700 640,772 562,772"/>
  <!-- C lane -->
  <path class="edge" d="M910,428 L910,442"/>
  <path class="edge" d="M910,486 L910,504"/>
  <path class="edge" d="M910,582 L910,606"/>
  <text class="lbl" x="918" y="598">Yes</text>
  <!-- C harvest -> sell (cross-link) -->
  <path class="edge" d="M830,628 L744,628"/>
  <text class="lbl" x="762" y="620">→ sell</text>
  <!-- C no -> C4 -->
  <path class="edge" d="M988,542 C1015,570 1015,688 992,688"/>
  <text class="lbl" x="998" y="560">No</text>
  <path class="edge" d="M910,710 C910,745 700,772 604,772"/>
  <!-- return loop pill -> home -->
  <path class="edged" d="M418,772 L40,772 L40,258 L498,258 L498,272"/>
  <text class="lbl" x="70" y="250">returns to Home · alerts re-engage</text>
  <!-- engine -> entries -->
  <path class="edged" d="M1012,796 C1160,796 1160,72 922,80"/>
  <text class="lbl" x="1120" y="430" transform="rotate(90 1120,430)">alert engine re-engages</text>

  <!-- ===================== NODES ===================== -->
  <!-- entry pills -->
  <g>
    <rect x="336" y="64" width="150" height="32" rx="16" fill="#E4F1E8" stroke="#BEE0C9"/><text class="n" x="411" y="84" text-anchor="middle">Open app</text>
    <rect x="506" y="64" width="210" height="32" rx="16" fill="#E4F1E8" stroke="#BEE0C9"/><text class="n" x="611" y="84" text-anchor="middle">Tap alert (WhatsApp / SMS)</text>
    <rect x="736" y="64" width="186" height="32" rx="16" fill="#E4F1E8" stroke="#BEE0C9"/><text class="n" x="829" y="84" text-anchor="middle">Push notification</text>
  </g>

  <!-- D1 decision -->
  <polygon points="611,116 691,150 611,184 531,150" fill="#FBEED2" stroke="#EBC978"/>
  <text class="n" x="611" y="153" text-anchor="middle">First launch?</text>

  <!-- onboarding -->
  <rect x="316" y="196" width="250" height="44" rx="10" fill="#F5E6EE" stroke="#DDB2CC"/>
  <text class="ns" x="441" y="214" text-anchor="middle" fill="#7a2f58">Onboarding: pick village</text>
  <text class="ns" x="441" y="228" text-anchor="middle" fill="#7a2f58">+ log first crop</text>

  <!-- HOME hub -->
  <rect x="451" y="272" width="320" height="60" rx="13" fill="#9B3B6E" stroke="#7a2f58"/>
  <text x="611" y="296" text-anchor="middle" font-weight="800" font-size="13" fill="#fff">🏠 Kebunku · Home</text>
  <text x="611" y="314" text-anchor="middle" font-weight="500" font-size="10" fill="#f2dce8">today's attention · plots · feature tabs</text>

  <!-- add-crop lane -->
  <rect x="78" y="384" width="160" height="44" rx="10" fill="#E4EEF4" stroke="#B8D2E1"/>
  <text class="ns" x="158" y="410" text-anchor="middle" fill="#2f6588">Add / edit crop</text>
  <rect x="78" y="450" width="160" height="44" rx="10" fill="#F5E6EE" stroke="#DDB2CC"/>
  <text class="ns" x="158" y="476" text-anchor="middle" fill="#7a2f58">Save → update catalog</text>

  <!-- W lane -->
  <rect x="330" y="384" width="160" height="44" rx="10" fill="#E4EEF4" stroke="#B8D2E1"/>
  <text class="ns" x="410" y="410" text-anchor="middle" fill="#2f6588">Cuaca + hama</text>
  <rect x="330" y="442" width="160" height="44" rx="10" fill="#E4EEF4" stroke="#B8D2E1"/>
  <text class="ns" x="410" y="468" text-anchor="middle" fill="#2f6588">Pick crop → verdict</text>
  <polygon points="410,502 490,542 410,582 330,542" fill="#FBEED2" stroke="#EBC978"/>
  <text class="ns" x="410" y="540" text-anchor="middle">Pest/disease</text>
  <text class="ns" x="410" y="552" text-anchor="middle">or too dry?</text>
  <rect x="182" y="526" width="106" height="32" rx="9" fill="#E4F1E8" stroke="#BEE0C9"/>
  <text class="ns" x="235" y="546" text-anchor="middle" fill="#1f6e3d">All clear ✓</text>
  <rect x="330" y="606" width="160" height="46" rx="10" fill="#F5E6EE" stroke="#DDB2CC"/>
  <text class="ns" x="410" y="626" text-anchor="middle" fill="#7a2f58">Spray window /</text>
  <text class="ns" x="410" y="640" text-anchor="middle" fill="#7a2f58">irrigate amount</text>
  <rect x="330" y="668" width="160" height="42" rx="10" fill="#F5E6EE" stroke="#DDB2CC"/>
  <text class="ns" x="410" y="694" text-anchor="middle" fill="#7a2f58">Set reminder / mark done</text>

  <!-- P lane -->
  <rect x="580" y="384" width="160" height="44" rx="10" fill="#E4EEF4" stroke="#B8D2E1"/>
  <text class="ns" x="660" y="410" text-anchor="middle" fill="#2f6588">Harga</text>
  <rect x="580" y="442" width="160" height="44" rx="10" fill="#E4EEF4" stroke="#B8D2E1"/>
  <text class="ns" x="660" y="468" text-anchor="middle" fill="#2f6588">Price + 8-wk forecast</text>
  <polygon points="660,502 740,542 660,582 580,542" fill="#FBEED2" stroke="#EBC978"/>
  <text class="ns" x="660" y="540" text-anchor="middle">In sell</text>
  <text class="ns" x="660" y="552" text-anchor="middle">window?</text>
  <rect x="748" y="526" width="98" height="32" rx="9" fill="#E4F1E8" stroke="#BEE0C9"/>
  <text class="ns" x="797" y="540" text-anchor="middle" fill="#1f6e3d">Hold +</text>
  <text class="ns" x="797" y="551" text-anchor="middle" fill="#1f6e3d">price alert</text>
  <rect x="580" y="606" width="160" height="46" rx="10" fill="#F5E6EE" stroke="#DDB2CC"/>
  <text class="ns" x="660" y="633" text-anchor="middle" fill="#7a2f58">Recommend sell in batches</text>
  <rect x="580" y="668" width="160" height="42" rx="10" fill="#F5E6EE" stroke="#DDB2CC"/>
  <text class="ns" x="660" y="694" text-anchor="middle" fill="#7a2f58">Connect buyer / mark sold*</text>

  <!-- C lane -->
  <rect x="830" y="384" width="160" height="44" rx="10" fill="#E4EEF4" stroke="#B8D2E1"/>
  <text class="ns" x="910" y="410" text-anchor="middle" fill="#2f6588">Kalender + biaya</text>
  <rect x="830" y="442" width="160" height="44" rx="10" fill="#E4EEF4" stroke="#B8D2E1"/>
  <text class="ns" x="910" y="468" text-anchor="middle" fill="#2f6588">Timeline + task + cost</text>
  <polygon points="910,502 990,542 910,582 830,542" fill="#FBEED2" stroke="#EBC978"/>
  <text class="ns" x="910" y="540" text-anchor="middle">Harvest</text>
  <text class="ns" x="910" y="552" text-anchor="middle">window?</text>
  <rect x="830" y="606" width="160" height="44" rx="10" fill="#F5E6EE" stroke="#DDB2CC"/>
  <text class="ns" x="910" y="632" text-anchor="middle" fill="#7a2f58">Harvest checklist</text>
  <rect x="830" y="668" width="160" height="42" rx="10" fill="#E4EEF4" stroke="#B8D2E1"/>
  <text class="ns" x="910" y="694" text-anchor="middle" fill="#2f6588">Next task + profit estimate</text>

  <!-- return pill -->
  <rect x="380" y="754" width="244" height="36" rx="18" fill="#E4F1E8" stroke="#BEE0C9"/>
  <text class="n" x="502" y="776" text-anchor="middle">Back to Home · next check</text>

  <!-- alert engine -->
  <rect x="742" y="774" width="270" height="44" rx="10" fill="#FBFAF4" stroke="#D8D2BF"/>
  <text class="ns" x="877" y="793" text-anchor="middle">🔔 Alert engine — weather /</text>
  <text class="ns" x="877" y="807" text-anchor="middle">pest / price / task triggers</text>

  <!-- legend -->
  <g transform="translate(24,828)">
    <rect x="0" y="0" width="14" height="12" rx="3" fill="#E4F1E8" stroke="#BEE0C9"/><text class="leg" x="20" y="10">Start / End</text>
    <rect x="120" y="0" width="14" height="12" rx="3" fill="#E4EEF4" stroke="#B8D2E1"/><text class="leg" x="140" y="10">Screen</text>
    <polygon points="235,0 247,6 235,12 223,6" fill="#FBEED2" stroke="#EBC978"/><text class="leg" x="254" y="10">Decision</text>
    <rect x="345" y="0" width="14" height="12" rx="3" fill="#F5E6EE" stroke="#DDB2CC"/><text class="leg" x="365" y="10">Action / system</text>
    <text class="leg" x="505" y="10" fill="#8a7a63">* later scope · dashed = background loop</text>
  </g>
</svg>
